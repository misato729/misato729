name: Generate metrics

on:
  schedule:
    # Changing the cron expression reactivates schedules disabled after inactivity.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  build:
    # Metrics v3.34 bundles an older Puppeteer/Chrome stack that hangs on Ubuntu 24.04.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@14179f2d8857c4a011fb3572b18bf524c68b5b1a # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: misato729
          filename: metrics.svg
          committer_message: "chore: update metrics [skip ci]"
          template: classic
          # ベース情報は最低限
          base: header, repositories, metadata
          config_timezone: Asia/Tokyo

          # 言語だけ（棒グラフ）
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6

          # ノイズ源になりやすいものは切る
          plugin_achievements: no
          plugin_habits: no
          plugin_calendar: no
          plugin_isocalendar: no
