name: Generate metrics

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate metrics
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const owner = "misato729";
            const ignored = new Set(["HTML", "CSS"]);
            const colors = {
              TypeScript: "#3178c6",
              JavaScript: "#f1e05a",
              PHP: "#4f5d95",
              Vue: "#41b883",
              Python: "#3572a5",
              Blade: "#f7523f",
              SCSS: "#c6538c",
              Shell: "#89e051",
              Dockerfile: "#384d54",
            };

            const repos = await github.paginate(
              github.rest.repos.listForUser,
              { username: owner, type: "owner", per_page: 100 },
            );

            const totals = new Map();
            for (const repo of repos) {
              if (repo.fork || repo.archived) continue;

              const { data: languages } = await github.rest.repos.listLanguages({
                owner,
                repo: repo.name,
              });

              for (const [language, bytes] of Object.entries(languages)) {
                if (ignored.has(language)) continue;
                totals.set(language, (totals.get(language) || 0) + bytes);
              }
            }

            const allBytes = [...totals.values()].reduce((sum, bytes) => sum + bytes, 0);
            if (!allBytes) throw new Error("No language data was returned by GitHub.");

            const languages = [...totals.entries()]
              .sort((a, b) => b[1] - a[1])
              .slice(0, 6)
              .map(([name, bytes]) => ({
                name,
                percentage: (bytes / allBytes) * 100,
              }));

            const escapeXml = (value) => String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;");

            const rows = languages.map((language, index) => {
              const y = 82 + index * 36;
              const width = Math.max(3, language.percentage * 3.5);
              const color = colors[language.name] || "#6e7781";
              return `
                <text class="label" x="24" y="${y}">${escapeXml(language.name)}</text>
                <rect class="track" x="170" y="${y - 13}" width="350" height="12" rx="6"/>
                <rect x="170" y="${y - 13}" width="${width.toFixed(1)}" height="12" rx="6" fill="${color}"/>
                <text class="value" x="610" y="${y}" text-anchor="end">${language.percentage.toFixed(1)}%</text>`;
            }).join("");

            const height = 105 + languages.length * 36;
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="${height}" viewBox="0 0 640 ${height}" role="img" aria-labelledby="title desc">
              <title id="title">Most used languages</title>
              <desc id="desc">Language usage across repositories owned by ${owner}, excluding HTML and CSS.</desc>
              <style>
                text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
                .title { fill: #24292f; font-size: 20px; font-weight: 600; }
                .subtitle, .value { fill: #57606a; font-size: 13px; }
                .label { fill: #24292f; font-size: 14px; font-weight: 500; }
                .track { fill: #d8dee4; }
                @media (prefers-color-scheme: dark) {
                  .title, .label { fill: #f0f6fc; }
                  .subtitle, .value { fill: #8c959f; }
                  .track { fill: #30363d; }
                }
              </style>
              <text id="title" class="title" x="24" y="32">Most used languages</text>
              <text class="subtitle" x="24" y="54">Owned repositories, excluding HTML and CSS</text>
              ${rows}
            </svg>`;

            fs.writeFileSync("metrics.svg", svg);
            core.info(`Generated metrics.svg from ${repos.length} public repositories.`);

      - name: Commit metrics
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- metrics.svg; then
            echo "metrics.svg is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          git commit -m "chore: update metrics [skip ci]"
          git push
