name: Generate metrics

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate metrics
        shell: bash
        run: |
          set -euo pipefail

          url="https://github-readme-stats.vercel.app/api/top-langs/?username=misato729&layout=compact&langs_count=6&hide=html,css&locale=ja&hide_border=true&custom_title=Languages"
          curl --fail --location --retry 3 --retry-all-errors \
            --connect-timeout 15 --max-time 60 \
            "$url" --output metrics.svg

          grep -q '<svg' metrics.svg
          if grep -q 'Something went wrong' metrics.svg; then
            echo "Metrics service returned an error card."
            exit 1
          fi

      - name: Commit metrics
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- metrics.svg; then
            echo "metrics.svg is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          git commit -m "chore: update metrics [skip ci]"
          git push
