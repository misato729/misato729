<svg xmlns="http://www.w3.org/2000/svg" width="640" height="321" viewBox="0 0 640 321" role="img" aria-labelledby="title desc">
  <title id="title">Most used languages</title>
  <desc id="desc">Language usage across repositories owned by misato729, excluding HTML and CSS.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .title { fill: #24292f; font-size: 20px; font-weight: 600; }
    .subtitle, .value { fill: #57606a; font-size: 13px; }
    .label { fill: #24292f; font-size: 14px; font-weight: 500; }
    .track { fill: #d8dee4; }
    @media (prefers-color-scheme: dark) {
      .title, .label { fill: #f0f6fc; }
      .subtitle, .value { fill: #8c959f; }
      .track { fill: #30363d; }
    }
  </style>
  <text id="title" class="title" x="24" y="32">Most used languages</text>
  <text class="subtitle" x="24" y="54">Owned repositories, excluding HTML and CSS</text>
  
    <text class="label" x="24" y="82">PHP</text>
    <rect class="track" x="170" y="69" width="350" height="12" rx="6"/>
    <rect x="170" y="69" width="125.0" height="12" rx="6" fill="#4f5d95"/>
    <text class="value" x="610" y="82" text-anchor="end">35.7%</text>
    <text class="label" x="24" y="118">Vue</text>
    <rect class="track" x="170" y="105" width="350" height="12" rx="6"/>
    <rect x="170" y="105" width="88.2" height="12" rx="6" fill="#41b883"/>
    <text class="value" x="610" y="118" text-anchor="end">25.2%</text>
    <text class="label" x="24" y="154">TypeScript</text>
    <rect class="track" x="170" y="141" width="350" height="12" rx="6"/>
    <rect x="170" y="141" width="72.7" height="12" rx="6" fill="#3178c6"/>
    <text class="value" x="610" y="154" text-anchor="end">20.8%</text>
    <text class="label" x="24" y="190">Blade</text>
    <rect class="track" x="170" y="177" width="350" height="12" rx="6"/>
    <rect x="170" y="177" width="49.0" height="12" rx="6" fill="#f7523f"/>
    <text class="value" x="610" y="190" text-anchor="end">14.0%</text>
    <text class="label" x="24" y="226">JavaScript</text>
    <rect class="track" x="170" y="213" width="350" height="12" rx="6"/>
    <rect x="170" y="213" width="10.3" height="12" rx="6" fill="#f1e05a"/>
    <text class="value" x="610" y="226" text-anchor="end">2.9%</text>
    <text class="label" x="24" y="262">Python</text>
    <rect class="track" x="170" y="249" width="350" height="12" rx="6"/>
    <rect x="170" y="249" width="3.8" height="12" rx="6" fill="#3572a5"/>
    <text class="value" x="610" y="262" text-anchor="end">1.1%</text>
</svg>